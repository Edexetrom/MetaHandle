services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meta_backend_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: meta_frontend_ui
    ports:
      - "80:80"
    restart: always
