services:
  # BACKEND: manejoapi.libresdeumas.com
  backend:
    build: .
    container_name: meta_backend_api
    ports:
      # [PUERTO VPS] : [PUERTO CONTENEDOR]
      - "8000"
    env_file:
      - .env
    restart: always

  # FRONTEND: manejometa.libresdeumas.com
  frontend:
    image: nginx:alpine
    container_name: meta_frontend_ui
    ports:
      # [PUERTO VPS] : [PUERTO NGINX]
      - "80" 
    volumes:
      # Montamos los archivos directamente en la carpeta pública de Nginx
      - ./index.html:/usr/share/nginx/html/index.html
      # AQUÍ ESTÁ LA CORRECCIÓN: Montar app.js en lugar de app.jsx
      - ./app.js:/usr/share/nginx/html/app.js
    restart: always
    depends_on:
      - backend