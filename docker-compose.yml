services:
  # BACKEND: manejoapi.libresdeumas.com (Puerto 8000)
  backend:
    build: .
    container_name: meta_backend_api
    ports:
      - "8000"
    env_file:
      - .env
    restart: always

  # FRONTEND: manejometa.libresdeumas.com
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: meta_frontend_ui
    ports:
      - "3000:80" # Frontend accesible en el puerto 3000 del host si no usas reverse proxy
    restart: always
