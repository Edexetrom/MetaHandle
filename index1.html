<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración Publicidad Meta</title>

    <!-- Importamos Tailwind CSS para igualar el diseño de la versión React -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Importamos la librería de íconos Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* CSS personalizado mínimo para cosas específicas como la selección de texto */
        ::selection {
            background-color: rgba(244, 63, 94, 0.3);
        }
    </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-900 via-[#4a3434] to-slate-900 text-slate-100 font-sans">

    <!-- ==========================================
         PANTALLA DE LOGIN
         ========================================== -->
    <div id="login-screen" class="flex items-center justify-center min-h-screen p-4">
        <div
            class="w-full max-w-md bg-white/10 backdrop-blur-lg border border-white/20 p-8 rounded-2xl shadow-[0_8px_32px_rgba(0,0,0,0.3)]">

            <div class="text-center mb-8">
                <div
                    class="bg-rose-500/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 border border-rose-500/50 shadow-[0_0_15px_rgba(244,63,94,0.4)]">
                    <i data-lucide="bar-chart-3" class="w-8 h-8 text-rose-300"></i>
                </div>
                <h1 class="text-2xl font-bold tracking-tight">Portal Meta Ads</h1>
                <p class="text-slate-400 text-sm mt-1">Ingresa tus credenciales para continuar</p>
            </div>

            <form id="login-form" class="space-y-5">
                <div class="space-y-1">
                    <label class="text-sm font-medium text-slate-300 ml-1">Correo Electrónico</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="mail" class="h-5 w-5 text-slate-400"></i>
                        </div>
                        <input type="email" id="email-input" required
                            class="w-full pl-10 pr-4 py-3 bg-black/20 border border-white/10 rounded-xl focus:ring-2 focus:ring-rose-500 focus:border-transparent outline-none transition-all text-white placeholder-slate-500"
                            placeholder="admin@empresa.com">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-sm font-medium text-slate-300 ml-1">Contraseña</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="h-5 w-5 text-slate-400"></i>
                        </div>
                        <input type="password" required
                            class="w-full pl-10 pr-4 py-3 bg-black/20 border border-white/10 rounded-xl focus:ring-2 focus:ring-rose-500 focus:border-transparent outline-none transition-all text-white placeholder-slate-500"
                            placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" id="login-btn"
                    class="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-rose-600 to-red-500 hover:from-rose-500 hover:to-red-400 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-[0_0_15px_rgba(244,63,94,0.3)] mt-4">
                    <span id="login-btn-text">Iniciar Sesión</span>
                    <i data-lucide="arrow-right" id="login-btn-icon" class="w-5 h-5"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- ==========================================
         PANEL DE ADMINISTRACIÓN (Oculto por defecto con la clase 'hidden')
         ========================================== -->
    <div id="dashboard-screen" class="hidden max-w-5xl mx-auto p-4 md:p-8">

        <!-- Header / Nav -->
        <header
            class="flex flex-col md:flex-row items-start md:items-center justify-between mb-10 gap-4 bg-white/5 p-4 rounded-2xl border border-white/10 backdrop-blur-sm">
            <div class="flex items-center gap-3">
                <div class="bg-rose-500/20 p-2 rounded-lg border border-rose-500/30">
                    <i data-lucide="bar-chart-3" class="w-6 h-6 text-rose-400"></i>
                </div>
                <h1 class="text-xl md:text-2xl font-bold">Administración Meta</h1>
            </div>

            <div class="flex items-center gap-4 w-full md:w-auto justify-between md:justify-end">
                <div class="flex items-center gap-2">
                    <i data-lucide="user-circle-2" class="w-8 h-8 text-slate-400"></i>
                    <div>
                        <!-- Span vacíos para inyectar los datos del usuario con JS -->
                        <p id="display-user-name" class="text-sm font-semibold leading-none">Usuario</p>
                        <p id="display-user-role" class="text-xs text-slate-400 mt-1">Rol</p>
                    </div>
                </div>
                <button id="logout-btn"
                    class="flex items-center gap-2 text-slate-400 hover:text-white bg-white/5 hover:bg-rose-500/20 px-3 py-2 rounded-lg transition-colors border border-transparent hover:border-rose-500/30">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    <span class="hidden sm:inline text-sm font-medium">Salir</span>
                </button>
            </div>
        </header>

        <!-- Contenido Principal -->
        <main class="grid grid-cols-1 md:grid-cols-3 gap-6">

            <!-- Tarjeta: Control Automático -->
            <section
                class="col-span-1 md:col-span-3 lg:col-span-1 bg-white/10 backdrop-blur-md border border-white/10 p-6 rounded-2xl flex flex-col justify-center items-center shadow-lg relative overflow-hidden group">
                <!-- Efecto de luz -->
                <div id="glow-effect"
                    class="absolute inset-0 bg-rose-500/10 blur-xl transition-opacity duration-500 opacity-0"></div>

                <h2 class="text-lg font-medium text-slate-300 mb-6 z-10">Motor Automático</h2>

                <div class="flex items-center gap-4 z-10">
                    <label id="toggle-label" class="text-xl font-bold cursor-pointer select-none">INACTIVO</label>

                    <button id="toggle-switch" type="button" role="switch"
                        class="bg-slate-600 w-16 h-8 flex items-center rounded-full p-1 cursor-pointer transition-all duration-300 focus:outline-none shadow-inner">
                        <div id="toggle-circle"
                            class="translate-x-0 bg-white w-6 h-6 rounded-full shadow-md transform transition-transform duration-300 flex items-center justify-center">
                        </div>
                    </button>
                </div>
                <p id="toggle-desc" class="text-xs text-slate-400 mt-6 text-center z-10">
                    El sistema no está optimizando las campañas automáticamente.
                </p>
            </section>

            <!-- Tarjeta: Métricas -->
            <section
                class="col-span-1 md:col-span-3 lg:col-span-2 bg-white/5 backdrop-blur-md border border-white/10 p-6 rounded-2xl shadow-lg">
                <h2 class="text-lg font-medium text-slate-300 mb-6 flex items-center gap-2">
                    <i data-lucide="activity" class="w-5 h-5 text-rose-400"></i>
                    Resumen en Tiempo Real
                </h2>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="bg-black/30 p-5 rounded-xl border border-white/5 flex items-center justify-between">
                        <div>
                            <p class="text-sm text-slate-400 font-medium mb-1">Anuncios Activos</p>
                            <p class="text-4xl font-bold text-white">12</p>
                        </div>
                        <div
                            class="w-12 h-12 rounded-full bg-blue-500/20 flex items-center justify-center border border-blue-500/30">
                            <i data-lucide="bar-chart-3" class="w-6 h-6 text-blue-400"></i>
                        </div>
                    </div>

                    <div class="bg-black/30 p-5 rounded-xl border border-white/5 flex items-center justify-between">
                        <div>
                            <p class="text-sm text-slate-400 font-medium mb-1">Gasto del Día</p>
                            <p class="text-4xl font-bold text-emerald-400 tracking-tight">$450<span
                                    class="text-2xl text-emerald-600">.00</span></p>
                        </div>
                        <div
                            class="w-12 h-12 rounded-full bg-emerald-500/20 flex items-center justify-center border border-emerald-500/30">
                            <i data-lucide="dollar-sign" class="w-6 h-6 text-emerald-400"></i>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- ==========================================
         LÓGICA JAVASCRIPT (VANILLA JS)
         ========================================== -->
    <script>
        // Inicializar los íconos
        lucide.createIcons();

        document.addEventListener('DOMContentLoaded', () => {
            // 1. REFERENCIAS AL DOM
            // En JS puro, tenemos que buscar uno por uno los elementos que vamos a modificar
            const loginScreen = document.getElementById('login-screen');
            const dashboardScreen = document.getElementById('dashboard-screen');

            const loginForm = document.getElementById('login-form');
            const btnLoginText = document.getElementById('login-btn-text');
            const btnLoginIcon = document.getElementById('login-btn-icon');
            const btnLogin = document.getElementById('login-btn');

            const displayUserName = document.getElementById('display-user-name');
            const displayUserRole = document.getElementById('display-user-role');
            const logoutBtn = document.getElementById('logout-btn');

            const toggleSwitch = document.getElementById('toggle-switch');
            const toggleCircle = document.getElementById('toggle-circle');
            const toggleLabel = document.getElementById('toggle-label');
            const toggleDesc = document.getElementById('toggle-desc');
            const glowEffect = document.getElementById('glow-effect');

            // Variable de estado manual
            let isAutoActive = false;

            // 2. LÓGICA DE LOGIN
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault(); // Evita que la página recargue

                // Cambiar el botón visualmente a "Cargando"
                btnLoginText.textContent = 'Autenticando...';
                btnLoginIcon.classList.add('hidden');
                btnLogin.style.opacity = '0.7';
                btnLogin.style.cursor = 'not-allowed';

                // Simular el retraso del servidor
                setTimeout(() => {
                    // Ocultar Login quitando/poniendo clases
                    loginScreen.classList.add('hidden');
                    // Mostrar Dashboard
                    dashboardScreen.classList.remove('hidden');

                    // Inyectar los datos manualmente en el HTML
                    displayUserName.textContent = 'Admin_01';
                    displayUserRole.textContent = 'Superadmin';

                    // Restaurar el botón por si cierran sesión
                    btnLoginText.textContent = 'Iniciar Sesión';
                    btnLoginIcon.classList.remove('hidden');
                    btnLogin.style.opacity = '1';
                    btnLogin.style.cursor = 'pointer';
                    loginForm.reset();
                }, 1000);
            });

            // 3. LÓGICA DE LOGOUT
            logoutBtn.addEventListener('click', () => {
                // Ocultar Dashboard y mostrar Login manualmente
                dashboardScreen.classList.add('hidden');
                loginScreen.classList.remove('hidden');

                // Reiniciar el botón de auto por seguridad
                if (isAutoActive) {
                    toggleSwitchAction();
                }
            });

            // 4. LÓGICA DEL INTERRUPTOR (TOGGLE)
            const toggleSwitchAction = () => {
                isAutoActive = !isAutoActive; // Cambiamos el estado

                if (isAutoActive) {
                    // Modificar clases manualmente para activarlo
                    toggleSwitch.classList.remove('bg-slate-600');
                    toggleSwitch.classList.add('bg-rose-500', 'shadow-[0_0_15px_rgba(244,63,94,0.5)]');

                    toggleCircle.classList.remove('translate-x-0');
                    toggleCircle.classList.add('translate-x-8');

                    toggleLabel.textContent = 'ACTIVO';
                    toggleDesc.textContent = 'El sistema está optimizando las campañas automáticamente.';

                    glowEffect.classList.remove('opacity-0');
                    glowEffect.classList.add('opacity-100');
                } else {
                    // Modificar clases manualmente para desactivarlo
                    toggleSwitch.classList.add('bg-slate-600');
                    toggleSwitch.classList.remove('bg-rose-500', 'shadow-[0_0_15px_rgba(244,63,94,0.5)]');

                    toggleCircle.classList.add('translate-x-0');
                    toggleCircle.classList.remove('translate-x-8');

                    toggleLabel.textContent = 'INACTIVO';
                    toggleDesc.textContent = 'El sistema no está optimizando las campañas automáticamente.';

                    glowEffect.classList.add('opacity-0');
                    glowEffect.classList.remove('opacity-100');
                }

                console.log("Enviando al backend -> Estado del bot:", isAutoActive);
            };

            // Escuchar clics tanto en el botón como en el texto "ACTIVO/INACTIVO"
            toggleSwitch.addEventListener('click', toggleSwitchAction);
            toggleLabel.addEventListener('click', toggleSwitchAction);
        });
    </script>
</body>

</html>
